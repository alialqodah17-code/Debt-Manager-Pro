name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Deps
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm --filter @workspace/mockup-sandbox run build
        env:
          EXPO_PUBLIC_DOMAIN: localhost

      - name: Capacitor Setup
        run: |
          pnpm --filter @workspace/mockup-sandbox add @capacitor/core @capacitor/cli @capacitor/android
          cd artifacts/mockup-sandbox
          npx cap init Diyoun com.ali.diyoun --web-dir dist
          npx cap add android

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd artifacts/mockup-sandbox/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Diyoun-App
          path: artifacts/mockup-sandbox/android/app/build/outputs/apk/debug/app-debug.apk
